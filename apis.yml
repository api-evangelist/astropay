aid: astropay
name: AstroPay
description: >-
  AstroPay is a Uruguay-founded fintech and electronic money institution
  offering a multicurrency wallet, virtual and physical AstroCards, FX, and
  cross-border money transfers for consumers across Latin America, plus a
  business platform that lets merchants accept payments, issue cards, manage
  payroll, and pay out to wallets and bank accounts. AstroPay is regulated as
  an EMI in the UK, Denmark, Isle of Man, and Brazil, and operates the
  AstroPay wallet across Argentina, Brazil, Chile, Mexico, Peru, Colombia,
  Uruguay, and additional global corridors with support for ARS, BRL, CLP,
  COP, EUR, GBP, MXN, PEN, USD, USDT, and UYU. For developers, AstroPay
  exposes a comprehensive REST platform spanning payments, payouts, PIX
  instant payments in Brazil, issued cards, savings accounts, scheme
  transfers, user account management, tokenization (PCI-compliant card
  collection), settlements, transaction reporting, hosted and embedded
  Checkout, QR-code POS, Wallet-on-File account linking, Cashouts, and
  Webhooks — accessed through `developers.astropay.com` with HMAC-signed
  callbacks and an OAuth/API-key authentication model.
url: https://raw.githubusercontent.com/api-evangelist/astropay/refs/heads/main/apis.yml
